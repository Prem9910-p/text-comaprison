  <!-- Divider line -->
  <rect x="31" y="10" width="2" height="44" fill="#0f172a"></rect>

  <!-- Center circle -->
  <circle cx="32" cy="32" r="7" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"></circle>

  <!-- <> symbol -->
  <text x="32" y="36" text-anchor="middle" font-size="9" fill="#0f172a" font-family="Arial, sans-serif">
    &lt;&gt;
  </text>

  <!-- Left "T" -->
  <text x="20" y="30" text-anchor="middle" font-size="12" fill="#0f172a" font-weight="bold">
