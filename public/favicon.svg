  <!-- Left page -->
  <path d="M12 14 h16 a4 4 0 0 1 4 4 v28 a4 4 0 0 1 -4 4 h-16 a4 4 0 0 1 -4 -4 v-28 a4 4 0 0 1 4 -4 z" fill="url(#blueGrad)"></path>

  <!-- Right page -->
