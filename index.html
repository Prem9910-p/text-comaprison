<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary SEO -->
    <title>Text Comparison — Free Online Diff Tool | Compare Two Texts Instantly</title>
    <meta
      name="description"
      content="Compare two texts side by side with line and word-level highlights. Runs in your browser — paste, compare, and spot differences. Free text diff with preprocessing options."
    />
    <meta
      name="keywords"
      content="text compare, text comparison, diff tool, compare texts online, text diff, difference checker, document compare, code diff, paste compare, offline diff, privacy-friendly diff"
    />
    <meta name="author" content="Text Comparison" />
    <meta name="creator" content="Text Comparison" />
    <meta name="publisher" content="Text Comparison" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#15803d" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1218" media="(prefers-color-scheme: dark)" />

    <!-- Canonical & language (absolute URLs when VITE_SITE_ORIGIN is set at build) -->
    <link rel="canonical" href="%SITE_ORIGIN%/" />
    <link rel="alternate" hreflang="x-default" href="%SITE_ORIGIN%/" />
    <link rel="alternate" hreflang="en" href="%SITE_ORIGIN%/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Text Comparison" />
    <meta
      property="og:title"
      content="Text Comparison — Free Online Diff Tool"
    />
    <meta
      property="og:description"
      content="Compare two texts side by side with word-level highlights. Private, browser-based diff — no upload required."
    />
    <meta property="og:url" content="%SITE_ORIGIN%/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="%SITE_ORIGIN%/favicon.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:alt" content="Text Comparison — compare two texts online" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Text Comparison — Free Online Diff Tool" />
    <meta
      name="twitter:description"
      content="Compare two texts with line & word highlights in your browser. Free and privacy-friendly."
    />
    <meta name="twitter:image" content="%SITE_ORIGIN%/favicon.svg" />
    <meta name="twitter:image:alt" content="Text Comparison app icon" />

    <!-- Web app hints -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Text Compare" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Text Comparison",
        "alternateName": "Text Compare",
        "description": "Compare two text versions side by side with line and word-level diff. Runs locally in the browser for privacy.",
        "url": "%SITE_ORIGIN%/",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web Browser",
        "browserRequirements": "Requires JavaScript. Modern evergreen browser recommended.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": "Side-by-side diff, word-level highlights, text preprocessing options, dark and light theme"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Text Comparison",
        "description": "Free browser-based tool to compare two texts and highlight differences.",
        "url": "%SITE_ORIGIN%/",
        "inLanguage": "en",
        "publisher": {
          "@type": "Organization",
          "name": "Text Comparison",
          "url": "%SITE_ORIGIN%/"
        }
      }
    </script>
  </head>
  <body>
    <noscript>
      <p>
        Text Comparison needs JavaScript enabled to compare texts in your browser. Please turn on
        JavaScript and reload this page.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
